name: vscode-extension

on:
  push:
    branches: [main]
    tags: ['vscode-v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        if: "!startsWith(github.ref, 'refs/tags/vscode-v')"
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure CMake (release)
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DVELLUM_LSP_SENTRY_DSN=${{ secrets.VELLUM_LSP_SENTRY_DSN }}
          -DVELLUM_SENTRY_ENVIRONMENT=${{ secrets.VELLUM_SENTRY_ENVIRONMENT }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tools/editors/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: tools/editors/vscode
        run: npm ci

      - name: Package VSIX
        working-directory: tools/editors/vscode
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vellum-vscode-extension
          path: tools/editors/vscode/dist/*.vsix
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/vscode-v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vellum-vscode-extension
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
