name: vscode-extension

on:
  push:
    branches: [main]
    tags: ['vscode-v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/vscode-v') && 'production' || null }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build parameters
        id: build
        shell: pwsh
        run: |
          $isRelease = '${{ github.ref }}' -match '^refs/tags/vscode-v'
          if ($isRelease) {
            "config=RelWithDebInfo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "config=Release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          "is_release=$($isRelease.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Configure CMake
        if: steps.build.outputs.is_release != 'true'
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ steps.build.outputs.config }}

      - name: Configure CMake (release)
        if: steps.build.outputs.is_release == 'true'
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ steps.build.outputs.config }}
          -DVELLUM_LSP_SENTRY_DSN=${{ secrets.VELLUM_LSP_SENTRY_DSN }}
          -DVELLUM_SENTRY_ENVIRONMENT=${{ secrets.VELLUM_SENTRY_ENVIRONMENT }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ steps.build.outputs.config }}

      - name: Read Sentry release
        if: steps.build.outputs.is_release == 'true'
        id: sentry_release
        shell: pwsh
        run: |
          $version = & "${{ github.workspace }}/tools/scripts/read-cmake-project-version.ps1" `
            -CMakeListsPath "${{ github.workspace }}/apps/vellum-lsp/CMakeLists.txt"
          "name=vellum-lsp@$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install sentry-cli
        if: steps.build.outputs.is_release == 'true'
        shell: bash
        run: |
          export INSTALL_DIR="$GITHUB_WORKSPACE/.sentry-cli"
          export SENTRY_CLI_VERSION="2.39.1"
          curl -sL https://sentry.io/get-cli/ | bash
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Create Sentry release and upload debug symbols
        if: steps.build.outputs.is_release == 'true'
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_LSP_PROJECT }}
        run: |
          set -euo pipefail

          release="${{ steps.sentry_release.outputs.name }}"
          build_dir="${{ github.workspace }}/build/apps/vellum-lsp/${{ steps.build.outputs.config }}"

          if [ -z "${SENTRY_ORG}" ] || [ -z "${SENTRY_PROJECT}" ] || [ -z "${SENTRY_AUTH_TOKEN}" ]; then
            echo "::error::Sentry secrets missing (SENTRY_ORG / SENTRY_LSP_PROJECT / SENTRY_AUTH_TOKEN). Check the production environment."
            exit 1
          fi

          if ! command -v sentry-cli >/dev/null 2>&1; then
            echo "::error::sentry-cli not found on PATH"
            echo "PATH=${PATH}"
            ls -la "${GITHUB_WORKSPACE}/.sentry-cli" || true
            exit 1
          fi

          echo "sentry-cli: $(command -v sentry-cli)"
          sentry-cli --version
          echo "Build dir: ${build_dir}"
          ls -la "${build_dir}"

          sentry-cli releases new "${release}" --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}"
          sentry-cli releases set-commits "${release}" --auto --ignore-missing --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}"
          sentry-cli debug-files upload \
            --org "${SENTRY_ORG}" \
            --project "${SENTRY_PROJECT}" \
            "${build_dir}"
          sentry-cli releases finalize "${release}" --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tools/editors/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: tools/editors/vscode
        run: npm ci

      - name: Package VSIX
        working-directory: tools/editors/vscode
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vellum-vscode-extension
          path: tools/editors/vscode/dist/*.vsix
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/vscode-v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vellum-vscode-extension
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
