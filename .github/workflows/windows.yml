# CLI build, test, release (v* tags), and Sentry symbol upload.
name: windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    environment: ${{ (startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/vscode-')) && 'production' || null }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build parameters
        id: build
        shell: pwsh
        run: |
          $isRelease = '${{ github.ref }}' -match '^refs/tags/v' -and '${{ github.ref }}' -notmatch '^refs/tags/vscode-'
          if ($isRelease) {
            "config=RelWithDebInfo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "config=Release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          "is_release=$($isRelease.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Configure CMake
        if: steps.build.outputs.is_release != 'true'
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ steps.build.outputs.config }}

      - name: Configure CMake (release)
        if: steps.build.outputs.is_release == 'true'
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ steps.build.outputs.config }}
          -DVELLUM_SENTRY_DSN=${{ secrets.VELLUM_SENTRY_DSN }}
          -DVELLUM_SENTRY_ENVIRONMENT=${{ secrets.VELLUM_SENTRY_ENVIRONMENT }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ steps.build.outputs.config }}

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest -C ${{ steps.build.outputs.config }}

      - name: Read Sentry release
        if: steps.build.outputs.is_release == 'true'
        id: sentry_release
        shell: pwsh
        run: |
          $version = & "${{ github.workspace }}/tools/scripts/read-cmake-project-version.ps1" `
            -CMakeListsPath "${{ github.workspace }}/apps/vellum/CMakeLists.txt"
          "name=vellum@$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install sentry-cli
        if: steps.build.outputs.is_release == 'true'
        shell: bash
        run: |
          export INSTALL_DIR="$GITHUB_WORKSPACE/.sentry-cli"
          export SENTRY_CLI_VERSION="2.39.1"
          curl -sL https://sentry.io/get-cli/ | bash
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Create Sentry release and upload debug symbols
        if: steps.build.outputs.is_release == 'true'
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_CLI_PROJECT }}
        run: |
          set -euo pipefail

          release="${{ steps.sentry_release.outputs.name }}"
          build_dir="${{ github.workspace }}/build/apps/vellum/${{ steps.build.outputs.config }}"

          if [ -z "${SENTRY_ORG}" ] || [ -z "${SENTRY_PROJECT}" ] || [ -z "${SENTRY_AUTH_TOKEN}" ]; then
            echo "::error::Sentry secrets missing (SENTRY_ORG / SENTRY_CLI_PROJECT / SENTRY_AUTH_TOKEN). Check the production environment."
            exit 1
          fi

          if ! command -v sentry-cli >/dev/null 2>&1; then
            echo "::error::sentry-cli not found on PATH"
            echo "PATH=${PATH}"
            ls -la "${GITHUB_WORKSPACE}/.sentry-cli" || true
            exit 1
          fi

          echo "sentry-cli: $(command -v sentry-cli)"
          sentry-cli --version
          echo "Build dir: ${build_dir}"
          ls -la "${build_dir}"

          sentry-cli releases new "${release}" --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}"
          sentry-cli releases set-commits "${release}" --auto --ignore-missing --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}"
          sentry-cli debug-files upload \
            --org "${SENTRY_ORG}" \
            --project "${SENTRY_PROJECT}" \
            "${build_dir}"
          sentry-cli releases finalize "${release}" --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}"

      - name: Upload CLI artifact
        if: steps.build.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vellum-cli
          path: |
            build/apps/vellum/${{ steps.build.outputs.config }}/vellum.exe
            build/apps/vellum/${{ steps.build.outputs.config }}/*.dll
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/vscode-')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: vellum-cli
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
