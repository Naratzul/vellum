# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure CMake (release)
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/vscode-')
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DVELLUM_SENTRY_DSN=${{ secrets.VELLUM_SENTRY_DSN }}
          -DVELLUM_SENTRY_ENVIRONMENT=${{ secrets.VELLUM_SENTRY_ENVIRONMENT }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest -C ${{ env.BUILD_TYPE }}

      - name: Upload CLI artifact
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/vscode-')
        uses: actions/upload-artifact@v4
        with:
          name: vellum-cli
          path: |
            build/apps/vellum/${{ env.BUILD_TYPE }}/vellum.exe
            build/apps/vellum/${{ env.BUILD_TYPE }}/*.dll
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/vscode-')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: vellum-cli
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
